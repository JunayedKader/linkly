services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=development
      - DB_HOST=db
      - DB_NAME=linkly
      - DB_USER=linkly
      - DB_PASS=linkly
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=linkly
      - POSTGRES_USER=linkly
      - POSTGRES_PASSWORD=linkly
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkly -d linkly"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:

networks:
  frontend:
  backend:
