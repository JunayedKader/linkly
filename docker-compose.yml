services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped
    # logging block — controls how this container's stdout/stderr
    # is handled by the Docker logging subsystem.
    logging:
      # json-file is Docker's default logging driver.
      # Writes logs as JSON to files on the host under
      # /var/lib/docker/containers/<id>/<id>-json.log
      driver: "json-file"
      options:
        # max-size — once the log file reaches this size, Docker
        # rotates it (renames it and starts a new file).
        # Without this, log files grow unbounded and fill the disk.
        max-size: "10m"
        # max-file — how many rotated log files to keep.
        # "3" means the current file plus 2 rotated backups.
        # Oldest files are deleted when this limit is exceeded.
        max-file: "3"
    # security_opt — Linux security options applied to the container.
    security_opt:
      # no-new-privileges — prevents the container process from gaining
      # additional privileges via setuid binaries or sudo.
      # Example: even if an attacker finds a setuid binary inside the
      # container, execing it cannot escalate to root.
      - no-new-privileges:true
    # cap_drop — drop Linux kernel capabilities from the container.
    # Containers inherit a default set of capabilities from Docker.
    # Dropping ALL and adding back only what's needed is the safest approach.
    cap_drop:
      - ALL
    # cap_add — add back only the specific capabilities Nginx needs.
    # NET_BIND_SERVICE: allows binding to ports below 1024 (port 80).
    # Without this, Nginx cannot bind to port 80 after dropping ALL.
    cap_add:
      - NET_BIND_SERVICE
      - SETUID       
      - SETGID
      - CHOWN
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
        reservations:
          cpus: "0.1"
          memory: 32M

  web:
    build: .
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      # Drop ALL capabilities from the Flask container.
      # Flask does not need any special kernel capabilities to run —
      # it's a pure userspace Python process binding to port 5000 (>1024).
      - ALL
    # read_only — mounts the container's root filesystem as read-only.
    # The container process cannot write anywhere on the filesystem
    # except explicitly declared tmpfs mounts below.
    # If an attacker gets code execution, they cannot write malware,
    # modify config files, or create persistence mechanisms.
    read_only: true
    # tmpfs — in-memory temporary filesystems mounted at these paths.
    # Required because read_only: true blocks all writes, but Python
    # and some libraries need to write temporary files at runtime.
    tmpfs:
      # /tmp — standard temporary file location. Python uses this
      # for various runtime operations.
      - /tmp
      # /app/__pycache__ — Python writes compiled .pyc bytecode cache
      # files here. PYTHONDONTWRITEBYTECODE=1 suppresses most of this,
      # but some edge cases still attempt writes. tmpfs prevents errors.
      - /app/__pycache__
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # PostgreSQL needs CHOWN to set file ownership on its data directory
      # during initialization, FOWNER for file permission operations,
      # and SETUID/SETGID to drop privileges after startup.
      # DAC_OVERRIDE — allows the process to bypass file permission checks (DAC = Discretionary Access Control). 
      # PostgreSQL needs this to access /var/lib/postgresql/data which is owned by a different UID 
      # than what the process runs as after dropping privileges.
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  redis:
    image: redis:7-alpine
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # Redis needs SETUID/SETGID to drop to its own user after startup.
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M

  cadvisor:
    # cAdvisor — Container Advisor, built by Google.
    # Reads container runtime metrics directly from the Linux kernel
    # via /sys and /proc filesystems, and from the Docker socket.
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    volumes:
      # These bind mounts give cAdvisor read-only access to the host
      # kernel interfaces it needs to collect metrics.

      # /rootfs — the host's root filesystem, mounted read-only.
      # cAdvisor uses this to read filesystem usage stats.
      - /:/rootfs:ro


      # /var/run — contains the Docker socket (docker.sock).
      # cAdvisor uses the socket to query Docker for container metadata
      # (names, labels, image names) to attach to the metrics it collects.
      - /var/run/docker.sock:/var/run/docker.sock

      # /sys — the Linux sysfs virtual filesystem.
      # Exposes kernel subsystem data: cgroups, network interfaces, block
      # devices. cAdvisor reads CPU, memory, and I/O limits from here.
      - /sys:/sys:ro

      # /var/lib/docker — Docker's data directory.
      # cAdvisor reads container layer and storage stats from here.
      - /var/lib/docker:/var/lib/docker:ro
    ports:
      # 8080 published so you can browse raw metrics at localhost:8080
      # and verify cAdvisor is collecting data before Prometheus scrapes it.
      - "8080:8080"
    networks:
      - monitoring
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      # Bind mount our config file into the location Prometheus expects it.
      # :ro — Prometheus reads this file, never writes to it.
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

      # Named volume for Prometheus time-series data.
      # Without this every restart loses all collected metrics history.
      - prometheus_data:/prometheus
    ports:
      # 9090 published so you can query Prometheus directly at localhost:9090
      # and verify scrape targets are healthy before setting up Grafana.
      - "9090:9090"
    networks:
      - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      # 3000 is Grafana's default web UI port.
      - "3000:3000"
    volumes:
      # Named volume for Grafana's database (SQLite by default).
      # Stores dashboards, users, datasource configs, and settings.
      # Without this every restart resets Grafana to factory defaults.
      - grafana_data:/var/lib/grafana
    environment:
      # Default admin credentials — change these in .env for any
      # environment that's network-accessible.
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # Disables Grafana's telemetry reporting to Grafana Labs.
      - GF_ANALYTICS_REPORTING_ENABLED=false
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M

volumes:
  postgres_data:
  # Two new named volumes for monitoring data persistence.
  prometheus_data:
  grafana_data:

networks:
  frontend:
  backend:
  # Separate network for monitoring stack — prometheus, grafana, cadvisor
  # talk to each other here without touching the app network.
  monitoring:
