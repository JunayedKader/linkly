# prometheus.yml is the main Prometheus configuration file.
# It tells Prometheus what to scrape, how often, and from where.

global:
  # scrape_interval — how often Prometheus pulls metrics from every target.
  # 15s is the standard default. Lower values give more resolution but
  # increase storage and CPU usage on both Prometheus and the targets.
  scrape_interval: 15s

  # evaluation_interval — how often Prometheus evaluates alerting rules.
  # We have no alerting rules this phase, but the field is required.
  evaluation_interval: 15s

scrape_configs:
  # Each entry under scrape_configs is a "job" — a named group of targets
  # that Prometheus scrapes together.

  - job_name: "prometheus"
    # Prometheus scrapes itself — useful for monitoring the monitor.
    # Exposes its own operational metrics (memory usage, scrape durations etc).
    static_configs:
      - targets: ["localhost:9090"]
        # localhost here means the Prometheus container itself,
        # not the Docker host.

  - job_name: "cadvisor"
    # cAdvisor exposes container metrics on port 8080.
    # "cadvisor" resolves via Compose service-name DNS — same mechanism
    # as DB_HOST=db in Phase 4.
    static_configs:
      - targets: ["cadvisor:8080"]
