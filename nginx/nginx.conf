# nginx.conf is the main Nginx configuration file.
# We define one "server block" — equivalent to a virtual host.

events {
    # events block is required by Nginx even if empty.
    # worker_connections defines how many simultaneous connections
    # one worker process can handle. 1024 is the standard default.
    worker_connections 1024;
}

http {
    # upstream block defines a named group of backend servers.
    # "web" here is the name we reference in proxy_pass below —
    # it has nothing to do with the Compose service name, though
    # we name it the same for clarity.
    upstream flask_app {
        # "web" resolves to the web container via Compose DNS.
        # Port 5000 is the port Flask listens on inside its container.
        # This is container-to-container traffic — not published to host.
        server web:5000;
    }

    server {
        # Nginx listens on port 80 inside its container.
        # docker-compose.yml maps host port 80 to this.
        listen 80;

        # Catch all requests regardless of hostname.
        server_name _;

        location / {
            # Forward all requests to the upstream group defined above.
            proxy_pass http://flask_app;

            # Pass the original client IP to Flask via a header.
            # Without this, Flask sees every request as coming from
            # the Nginx container IP, not the real client IP.
            proxy_set_header X-Real-IP $remote_addr;

            # Standard header that accumulates the chain of proxies
            # the request has passed through.
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Tell Flask the original Host header the client sent,
            # not the internal "web:5000" host.
            proxy_set_header Host $host;
        }
    }
}
