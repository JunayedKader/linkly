# nginx.conf is the main Nginx configuration file.
# We define one "server block" — equivalent to a virtual host.
events {
    # worker_connections — max simultaneous connections per worker process.
    # Nginx can handle many concurrent connections efficiently because it
    # uses an event-driven, non-blocking architecture rather than one
    # thread per connection.
    worker_connections 1024;
}

http {
    upstream flask_app {
        # When web is scaled to multiple replicas, Compose creates containers
        # named web-1, web-2, web-3 etc. Nginx resolves "web" via Compose DNS
        # which returns all container IPs for that service.
        # Nginx distributes requests across them using round-robin by default —
        # request 1 goes to web-1, request 2 to web-2, request 3 to web-3,
        # request 4 back to web-1, and so on.
        server web:5000;
    }

    server {
        # Nginx listens on port 80 inside its container.
        # The host machine maps its port 80 to this via docker-compose.yml.
        listen 80;

        # server_name _ is a catch-all — matches any hostname in the request.
        # Used when you don't have a real domain name configured.
        server_name _;

        location / {
            # Forward all matching requests to the upstream group.
            # http://flask_app references the upstream block name above.
            proxy_pass http://flask_app;

            # X-Real-IP — tells Flask the actual client IP address.
            # $remote_addr is Nginx's variable for the connecting client's IP.
            # Without this header Flask would see the Nginx container IP instead.
            proxy_set_header X-Real-IP $remote_addr;

            # X-Forwarded-For — standard header listing all proxy IPs the
            # request passed through. $proxy_add_x_forwarded_for appends
            # $remote_addr to any existing X-Forwarded-For header value.
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Host — passes the original Host header from the client request
            # to Flask. Without this Flask sees "web:5000" as the host
            # instead of whatever domain the client requested.
            proxy_set_header Host $host;
        }
    }
}
